<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0E1A"/>
      <stop offset="100%" stop-color="#12162B"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="glassFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="45"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="55"/></filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <circle cx="150" cy="60" r="140" fill="url(#orb1)" filter="url(#blur1)"/>
  <circle cx="1080" cy="240" r="160" fill="url(#orb2)" filter="url(#blur2)"/>
  <circle cx="620" cy="280" r="120" fill="url(#orb3)" filter="url(#blur1)"/>

  <!-- glass panel -->
  <rect x="60" y="50" width="1080" height="200" rx="24" fill="url(#glassFill)" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="1.2"/>

  <!-- Bezier / design-tool motif, top right of panel -->
  <g opacity="0.85">
    <path d="M 940 90 C 990 60, 1040 130, 1090 100" stroke="url(#textGrad)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
    <circle cx="940" cy="90" r="4.5" fill="#22D3EE"/>
    <circle cx="990" cy="60" r="3" fill="#8B5CF6"/>
    <circle cx="1040" cy="130" r="3" fill="#8B5CF6"/>
    <circle cx="1090" cy="100" r="4.5" fill="#EC4899"/>
    <line x1="940" y1="90" x2="990" y2="60" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="1090" y1="100" x2="1040" y2="130" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.4"/>
  </g>

  <!-- Name -->
  <text x="100" y="150" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="700" fill="url(#textGrad)" letter-spacing="1">
    Sanjeevan
  </text>

  <!-- Tagline -->
  <text x="102" y="188" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="400" fill="#94A3B8" letter-spacing="0.5">
    UI/UX Designer · Software Developer
  </text>

  <!-- mono accent line, like a code comment -->
  <text x="102" y="216" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="14" fill="#22D3EE" opacity="0.85">
    &lt;/&gt; designing interfaces, then building the ones that ship
  </text>

  <!-- thin divider -->
  <line x1="102" y1="228" x2="500" y2="228" stroke="url(#textGrad)" stroke-width="1.5" opacity="0.6"/>
</svg>
